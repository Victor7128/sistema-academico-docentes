<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Fondo azul institucional con esquinas redondeadas (estilo app icon) -->
  <rect width="512" height="512" rx="110" fill="#1B3A6B"/>

  <!-- Resplandor ámbar sutil en esquina superior derecha -->
  <radialGradient id="glow" cx="80%" cy="18%" r="45%">
    <stop offset="0%" stop-color="#C8882A" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#1B3A6B" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- ── Libro / registro ── -->
  <!-- Sombra suave del libro -->
  <rect x="112" y="102" width="232" height="298" rx="18" fill="#000000" opacity="0.18"/>

  <!-- Cuerpo del libro (blanco) -->
  <rect x="108" y="96" width="232" height="298" rx="18" fill="#F5F3EE"/>

  <!-- Lomo dorado izquierdo -->
  <rect x="108" y="96" width="46" height="298" rx="18" fill="#C8882A"/>
  <!-- Tapa del lomo (esquina derecha cuadrada para unirse al cuerpo) -->
  <rect x="130" y="96" width="24" height="298" fill="#C8882A"/>

  <!-- Detalle: costuras del lomo -->
  <circle cx="131" cy="148" r="5" fill="#A06820"/>
  <circle cx="131" cy="256" r="5" fill="#A06820"/>
  <circle cx="131" cy="364" r="5" fill="#A06820"/>

  <!-- Líneas de renglón -->
  <line x1="172" y1="172" x2="316" y2="172" stroke="#DDE3EE" stroke-width="10" stroke-linecap="round"/>
  <line x1="172" y1="208" x2="316" y2="208" stroke="#DDE3EE" stroke-width="10" stroke-linecap="round"/>
  <line x1="172" y1="244" x2="316" y2="244" stroke="#DDE3EE" stroke-width="10" stroke-linecap="round"/>
  <line x1="172" y1="280" x2="290" y2="280" stroke="#DDE3EE" stroke-width="10" stroke-linecap="round"/>

  <!-- Notas tipo badge: AD A B C en columna -->
  <rect x="294" y="158" width="38" height="28" rx="6" fill="#EEF2F9"/>
  <text x="313" y="177" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#1B3A6B">AD</text>

  <rect x="294" y="194" width="38" height="28" rx="6" fill="#DCFCE7"/>
  <text x="313" y="213" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#16A34A">A</text>

  <rect x="294" y="230" width="38" height="28" rx="6" fill="#FEF9C3"/>
  <text x="313" y="249" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#CA8A04">B</text>

  <rect x="294" y="266" width="38" height="28" rx="6" fill="#FEE2E2"/>
  <text x="313" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#DC2626">C</text>

  <!-- ── Círculo dorado con check ── -->
  <circle cx="352" cy="368" r="88" fill="#1B3A6B"/>
  <circle cx="352" cy="368" r="80" fill="#C8882A"/>
  <circle cx="352" cy="368" r="72" fill="#D4982E"/>

  <!-- Check blanco grueso -->
  <polyline
    points="316,370 340,394 392,338"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

</svg>